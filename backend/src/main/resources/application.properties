server.port=8080

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=taskmanagement;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
server.servlet.context-path=/taskmanager
spring.jpa.properties.hibernate.format_sql=true

# # Tạm tắt security để test, xoá dòng này khi làm JWT sau
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration


# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=profile,email


# GitHub OAuth2

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}

spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.security.oauth2.client.registration.github.scope=read:user,user:email

# JWT (HttpOnly cookie)
jwt.secret=taskmanagement-jwt-secret-key-change-in-production-min-256-bits!!
jwt.expiration-ms=86400000
jwt.cookie-name=access_token
jwt.cookie-path=/taskmanager
jwt.cookie-secure=false

app.frontend-url=http://localhost:5173/taskmanager/dashboard

